exp_id: "thinkdepthai_openrca2_lite"
agent_type: "langgraph_rca"
model_name: ""

data:
  dataset: "RCABench"
  type: single
  question_field: question
  gt_field: answer
  tags:
    - openrca2-lite

db_url: "sqlite:////home/nn/workspace/AgentM/eval.db"

concurrency: 5
judge_concurrency: 5

# Root path for dataset sources.
# Resolved as: {source_path}/{source}/converted
source_path: "/mnt/jfs/rcabench_dataset"

judge_model:
  model_provider:
    type: chat.completions
    model: ${UTU_LLM_MODEL}
    base_url: ${UTU_LLM_BASE_URL}
    api_key: ${UTU_LLM_API_KEY}
  rate_limit:
    rpm: 500
    tpm: 320000
    max_retries: 20
