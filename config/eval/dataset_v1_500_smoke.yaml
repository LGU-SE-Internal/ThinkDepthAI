exp_id: "thinkdepthai_dataset_v1_500_smoke"
agent_type: "langgraph_rca"
model_name: ""

data:
  dataset: "RCABench"
  type: single
  question_field: question
  gt_field: answer
  tags:
    - dataset_v1_500

# db_url read from $LLM_EVAL_DB_URL.

concurrency: 1
judge_concurrency: 1
max_samples: 1

# source_path is intentionally omitted: each DatasetSample row's
# meta.source_data_dir already points at the absolute case directory
# (set by scripts/seed_dataset_v1_db.py). For shared-DB scenarios where
# rows came from a different layout, set source_path / source_path_pattern
# here to override.

judge_model:
  model_provider:
    type: chat.completions
    model: ${UTU_LLM_MODEL}
    base_url: ${UTU_LLM_BASE_URL}
    api_key: ${UTU_LLM_API_KEY}
  rate_limit:
    rpm: 500
    tpm: 320000
    max_retries: 20
