exp_id: "thinkdepthai_openrca2_lite_v1_new"
agent_type: "langgraph_rca"
model_name: ""

data:
  dataset: "RCABench"
  type: single
  question_field: question
  gt_field: answer
  tags:
    # Subset of openrca2-lite-v1 whose meta.source_data_dir was written by
    # *this* machine's seeder (so case dirs resolve locally). Use this when
    # running against a shared DB whose openrca2-lite-v1-old rows point at
    # a different machine's filesystem.
    - openrca2-lite-v1-new

# db_url is read from $LLM_EVAL_DB_URL.

concurrency: 5
judge_concurrency: 5

judge_model:
  model_provider:
    type: chat.completions
    model: ${UTU_LLM_MODEL}
    base_url: ${UTU_LLM_BASE_URL}
    api_key: ${UTU_LLM_API_KEY}
  rate_limit:
    rpm: 500
    tpm: 320000
    max_retries: 20
