exp_id: "thinkdepthai_openrca2_lite_v1"
agent_type: "langgraph_rca"
model_name: ""

data:
  dataset: "RCABench"
  type: single
  question_field: question
  gt_field: answer
  tags:
    - openrca2-lite-v1

# db_url is read from $LLM_EVAL_DB_URL (set in .env). Defaults to a local
# cwd-relative SQLite if unset. The schema is auto-created on first connect.

concurrency: 5
judge_concurrency: 5

# source_path is intentionally omitted: each DatasetSample row's
# meta.source_data_dir already points at the absolute case directory
# (set by scripts/seed_lite_v1_db.py from the lite_v1 snapshot).

judge_model:
  model_provider:
    type: chat.completions
    model: ${UTU_LLM_MODEL}
    base_url: ${UTU_LLM_BASE_URL}
    api_key: ${UTU_LLM_API_KEY}
  rate_limit:
    rpm: 500
    tpm: 320000
    max_retries: 20
